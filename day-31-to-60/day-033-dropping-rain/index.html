<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dual Side Dot Pattern</title>
  <style>
    body {
      margin: 0;
      background: black;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// SETTINGS
const dotSize = 3;
const gap = 4;
const columns = Math.floor(canvas.width / (dotSize + gap));

// 2–3 tall columns (top)
const tallColumns = new Set();
while (tallColumns.size < 25) {
  tallColumns.add(Math.floor(Math.random() * columns));
}

function drawPattern() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 🔝 TOP PATTERN
  for (let i = 0; i < columns; i++) {
    const x = i * (dotSize + gap);

    let maxHeight;

    if (tallColumns.has(i)) {
      maxHeight = canvas.height * (Math.random() * 0.4 + 0.6);
    } else {
      maxHeight = canvas.height * (Math.random() * 0.3 + 0.25);
    }

    for (let y = 0; y < maxHeight; y += (dotSize + gap)) {
      const depth = y / canvas.height;

      let probability = depth < 0.5
        ? 0.55 + Math.random() * 0.2   // sparse top
        : 0.8 + Math.random() * 0.15; // dense bottom

      if (Math.random() < probability) {
        const opacity = 0.15 + depth * 0.6;
        const brightness = 100 + depth * 140;

        ctx.fillStyle = `rgba(${brightness},${brightness},${brightness},${opacity})`;
        ctx.fillRect(x, y, dotSize, dotSize);
      }
    }
  }

  // 🔻 BOTTOM REFLECTION (SUBTLE)
  for (let i = 0; i < columns; i++) {
    const x = i * (dotSize + gap);

    // shorter height from bottom
    const maxHeight = canvas.height * (Math.random() * 0.25 + 0.2);

    for (let y = 0; y < maxHeight; y += (dotSize + gap)) {
      const depth = y / canvas.height;

      // more randomness + less density
      const probability = 0.4 + Math.random() * 0.2;

      if (Math.random() < probability) {

        // 🌫️ LOWER opacity than top
        const opacity = 0.15 + depth * 0.25;
        const brightness = 80 + depth * 100;

        ctx.fillStyle = `rgba(${brightness},${brightness},${brightness},${opacity})`;

        // draw upward from bottom
        const drawY = canvas.height - y;

        ctx.fillRect(x, drawY, dotSize, dotSize);
      }
    }
  }

  // subtle bottom glow
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "rgba(0,0,0,0)");
  gradient.addColorStop(1, "rgba(255,255,255,0.05)");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

drawPattern();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drawPattern();
});
</script>

</body>
</html>
