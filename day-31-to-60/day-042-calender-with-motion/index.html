<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Animated Calendar</title>
</head>

<body class="min-h-screen bg-[#F7F7F7] flex items-center justify-center p-6 overflow-hidden">

    <div
        class="w-[340px] h-[390px] border border-[#D9D9D9] rounded-[24px] bg-white flex items-center justify-center overflow-hidden shadow-xs">

        <div>
            <div class="flex items-center justify-between mb-7 ">

                <button id="prevBtn"
                    class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#F5F5F5] transition-all duration-300 active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="transition-transform duration-300 hover:-translate-x-[2px]">
                        <path d="M11.5 4.5L6 10L11.5 15.5" stroke="#1F1F1F" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>

                <div class="flex items-center gap-2">

                    <div
                        class="h-[42px] px-4 border border-[#D9D9D9] rounded-[14px] flex items-center gap-3 bg-white cursor-pointer hover:bg-[#FAFAFA] transition-colors duration-200">
                        <span id="monthText" class="text-[16px] font-medium text-[#1F1F1F]"></span>

                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 5L7 9L11 5" stroke="#1F1F1F" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>

                    <div
                        class="h-[42px] px-4 border border-[#D9D9D9] rounded-[14px] flex items-center gap-3 bg-white cursor-pointer hover:bg-[#FAFAFA] transition-colors duration-200">
                        <span id="yearText" class="text-[16px] font-medium text-[#1F1F1F]"></span>

                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 5L7 9L11 5" stroke="#1F1F1F" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>

                </div>

                <button id="nextBtn"
                    class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#F5F5F5] transition-all duration-300 active:scale-90">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="transition-transform duration-300 hover:translate-x-[2px]">
                        <path d="M8.5 4.5L14 10L8.5 15.5" stroke="#1F1F1F" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>

            </div>

            <div class="grid grid-cols-7 gap-[1px] mb-3">
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Su</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Mo</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Tu</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">We</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Th</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Fr</div>
                <div class="w-9 text-center text-[12px] font-medium text-[#757575]">Sa</div>
            </div>

            <div class="relative overflow-hidden h-[240px]">
                <div id="calendarGrid" class="absolute inset-0 grid grid-cols-7 gap-[1px]  transition-all duration-300">
                </div>
            </div>
        </div>

    </div>

    <script>
        const months = [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul',
            'Aug',
            'Sep',
            'Oct',
            'Nov',
            'Dec'
        ];

        let currentDate = new Date(2026, 4, 1);

        const monthText = document.getElementById('monthText');
        const yearText = document.getElementById('yearText');
        const calendarGrid = document.getElementById('calendarGrid');

        const rangeStart = 4;
        const rangeEnd = 9;

        function renderCalendar(direction = 'right') {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthText.textContent = months[month];
            yearText.textContent = year;

            calendarGrid.classList.remove(
                'translate-x-10',
                '-translate-x-10',
                'opacity-0'
            );

            calendarGrid.classList.add(
                direction === 'right'
                    ? 'translate-x-10'
                    : '-translate-x-10',
                'opacity-0'
            );

            setTimeout(() => {
                calendarGrid.innerHTML = '';

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const prevMonthDays = new Date(year, month, 0).getDate();

                const prevDays = [];

                for (let i = firstDay - 1; i >= 0; i--) {
                    prevDays.unshift({
                        day: prevMonthDays - i,
                        current: false,
                    });
                }

                const currentDays = [];

                for (let i = 1; i <= daysInMonth; i++) {
                    currentDays.push({
                        day: i,
                        current: true,
                    });
                }

                const totalShown = prevDays.length + currentDays.length;
                const remaining = totalShown <= 35 ? 35 - totalShown : 42 - totalShown;

                const nextDays = [];

                for (let i = 1; i <= remaining; i++) {
                    nextDays.push({
                        day: i,
                        current: false,
                    });
                }

                const allDays = [...prevDays, ...currentDays, ...nextDays];

                allDays.forEach((item, index) => {
                    const day = document.createElement('div');

                    const isStart = item.day === rangeStart && item.current;
                    const isEnd = item.day === rangeEnd && item.current;
                    const isMiddle =
                        item.day > rangeStart &&
                        item.day < rangeEnd &&
                        item.current;

                    let classes =
                        'w-8 h-8 flex items-center justify-center text-[18px] font-normal rounded-[8px] transition-all duration-300';

                    if (!item.current) {
                        classes += ' text-[#D1D1D1]';
                    } else if (isStart || isEnd) {
                        classes += ' bg-[#2C2C2C] text-white';
                    } else if (isMiddle) {
                        classes += ' bg-[#F5F5F5] text-black';
                    } else {
                        classes += ' text-black hover:bg-[#F5F5F5] cursor-pointer';
                    }

                    day.className = classes;
                    day.textContent = item.day;

                    day.style.opacity = '0';
                    day.style.transform = 'translateY(10px)';
                    day.style.transition = `all 0.25s ease ${index * 0.01}s`;

                    calendarGrid.appendChild(day);

                    requestAnimationFrame(() => {
                        day.style.opacity = '1';
                        day.style.transform = 'translateY(0px)';
                    });
                });

                calendarGrid.classList.remove(
                    'translate-x-10',
                    '-translate-x-10',
                    'opacity-0'
                );

            }, 180);
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate = new Date(
                currentDate.getFullYear(),
                currentDate.getMonth() + 1,
                1
            );

            renderCalendar('right');
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate = new Date(
                currentDate.getFullYear(),
                currentDate.getMonth() - 1,
                1
            );

            renderCalendar('left');
        });

        renderCalendar();
    </script>

</body>

</html>
