<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      font-family: Inter, sans-serif;
    }
  </style>
</head>

<body class="bg-[#ECECEC] min-h-screen flex items-center justify-center p-10">

  <div class="space-y-10">

    <!-- Card 1 -->
    <div class="bg-white rounded-3xl shadow px-5 py-5">

      <!-- Header -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-5 h-5 border border-gray-400 rounded flex items-center justify-center">
            <div class="w-2 h-2 bg-gray-400 rounded-sm"></div>
          </div>

          <h2 class="text-[16px]  font-semibold text-gray-800">
            Training Analysis
          </h2>
        </div>

        <button class="px-4 py-1.5 rounded-xl border border-gray-200 text-gray-600 text-sm bg-gray-50">
          Details
        </button>
      </div>

      <div class="border-t border-gray-100 mt-4 pt-4"></div>

      <!-- Content -->
      <div class="flex justify-between items-end">

        <!-- Left -->
        <div>
          <h3 class="text-[22px]  font-semibold text-gray-800 leading-none">
            12 courses
          </h3>

          <p class="text-gray-400 text-[14px] mt-1">
            Completed in this quarter
          </p>

          <!-- Attendees -->
          <div class="flex items-center mt-5">
            <div class="flex -space-x-2">
              <img
                src="https://i.pravatar.cc/40?img=11"
                class="w-7 h-7 rounded-full border-2 border-white"
              />

              <img
                src="https://i.pravatar.cc/40?img=32"
                class="w-7 h-7 rounded-full border-2 border-white"
              />

              <img
                src="https://i.pravatar.cc/40?img=18"
                class="w-7 h-7 rounded-full border-2 border-white"
              />
            </div>

            <span class="ml-2 text-gray-500 text-sm">
              26 Attended
            </span>
          </div>
        </div>

        <!-- Bar Graph -->
        <div class="flex items-end gap-2 h-28 pb-1">
          <div class="w-4 h-12 bg-purple-200 rounded"></div>
          <div class="w-4 h-26 bg-purple-200 rounded"></div>
          <div class="w-4 h-20 bg-purple-500 rounded"></div>
          <div class="w-4 h-14 bg-purple-200 rounded"></div>
          <div class="w-4 h-24 bg-purple-200 rounded"></div>
          <div class="w-4 h-22 bg-purple-500 rounded"></div>
          <div class="w-4 h-12 bg-purple-200 rounded"></div>
        </div>

      </div>
    </div>

    <!-- Card 2 -->
    <div class="bg-white rounded-3xl shadow px-5 py-5">

      <!-- Header -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-gray-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5V4H2v16h5m10 0v-5a3 3 0 10-6 0v5m6 0H11" />
          </svg>

          <h2 class="text-[16px]  font-semibold text-gray-800">
            Employee Rating
          </h2>
        </div>

        <button class="px-4 py-1.5 rounded-xl border border-gray-200 text-gray-600 text-sm bg-gray-50">
          Details
        </button>
      </div>

      <!-- Content -->
      <div class="mt-6 flex justify-between items-center">

        <!-- Left -->
        <div>
          <p class="text-[12px] tracking-wider text-gray-400 uppercase font-semibold">
            Total Rating
          </p>

          <div class="flex items-center gap-2 mt-2">
            <span class="text-yellow-400 text-2xl">★</span>

            <div class="flex items-end gap-1">
              <span class="text-2xl font-semibold text-gray-800">
                3.6/5
              </span>

              <span class="text-gray-400 text-sm mb-1">
                (Overall 4.5)
              </span>
            </div>
          </div>

          <!-- Bottom pill -->
          <div class="mt-5 bg-gray-100 rounded-xl px-4 py-2 text-xs text-gray-500 flex items-center justify-between w-[230px]">
            <span>Total work hours include extra hours.</span>

            <span class="w-4 h-4 rounded-full border border-gray-300 flex items-center justify-center text-[10px]">
              i
            </span>
          </div>
        </div>

        <!-- Line Graph -->
        <div class="w-[120px] h-[80px]">
          <svg viewBox="0 0 120 80" class="w-full h-full">
            <path
              d="M0 60 
                 C10 65, 15 20, 30 25
                 C40 30, 35 55, 50 50
                 C65 45, 70 50, 80 35
                 C90 20, 100 55, 120 25"
              fill="none"
              stroke="#8B5CF6"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
