<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Geist Mono", monospace;
            background: #e8e8ed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .soft-card{
            border-radius: 1.5rem;
        }
        .soft-card {
            box-shadow:
                8px 8px 20px rgba(0, 0, 0, 0.06),
                -8px -8px 20px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="soft-card bg-gray-50 rounded-2xl w-80">

        <!-- Top Row -->
        <div class="flex justify-between items-center px-6 py-4">
            <div>
                <p class="text-gray-400 text-xs font-semibold">NVDA</p>
                <p class="text-xl font-semibold text-gray-600">$201<span class="text-gray-300">.39</span></p>
            </div>

            <span class="text-green-600 text-xs font-medium bg-gray-100 px-2 py-1 rounded border border-gray-200">
                + 0.4%
            </span>
        </div>

        <div class="border-t border-gray-200"></div>
    

        <!-- Stats -->
        <div class="rounded-b-3xl space-y-2 text-sm px-6 py-3 bg-gray-100 ">

            <div class="flex justify-between items-center">
                <span class="text-gray-400"> Day</span>
                <span class="text-green-600 text-xs font-medium">$8.34 (4.00%)</span>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-gray-400">Month</span>
                <span class="text-red-500 text-xs font-medium">- $2.23 (0.98%)</span>
            </div>

        </div>

    </div>

</body>

</html>
