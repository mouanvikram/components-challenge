<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Forest Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

  <div class="relative w-80 rounded-[15px]  shadow overflow-hidden bg-black">

    <!-- Background Image -->
    <img src="women_walking_in_forest.jpg" alt="forest" class="absolute inset-0 w-full h-full object-cover" />

    <div class="absolute bottom-0 left-0 w-full h-full
               
                bg-gradient-to-t from-black to-transparent">
    </div>

    <!-- Dark Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent"></div>

    <!-- Share Button -->
    <div class="absolute top-4 right-4 z-10">
      <button class="bg-white/20 backdrop-blur-md p-2 rounded-lg text-white hover:bg-white/30">
        <!-- Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7M16 6l-4-4m0 0L8 6m4-4v14" />
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="relative z-10 p-[15px] flex flex-col justify-end h-[420px]">

      <!-- Avatars -->
      <div class="flex items-center space-x-2 mb-2">
        <div class="flex -space-x-2">
          <img class="w-6 h-6 rounded-full border border-white" src="https://i.pravatar.cc/100?img=1" />
          <img class="w-6 h-6 rounded-full border border-white" src="https://i.pravatar.cc/100?img=2" />
          <img class="w-6 h-6 rounded-full border border-white" src="https://i.pravatar.cc/100?img=3" />
        </div>
        <span class="text-xs text-gray-200">Join 300+ Nature Seekers</span>
      </div>

      <!-- Title -->
      <h2 class="text-white text-xl font-semibold leading-tight">
        The Golden Forest Walk
      </h2>

      <!-- Description -->
      <p class="text-gray-300 text-sm mt-1 mb-4">
        A gentle trail experience for those who enjoy quiet paths and warm sunlight.
      </p>

      <!-- Button -->
      <div class="bg-white rounded-[5px] p-3 shadow-lg">
        <button class="w-full text-gray-800 font-medium text-center cursor-pointer">
          Join the activity
        </button>
      </div>

    </div>
  </div>

</body>

</html>
