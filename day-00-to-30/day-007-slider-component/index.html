<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── shadcn/ui design tokens ── */
  :root {
    --background: #ffffff;
    --foreground: #09090b;
    --card: #ffffff;
    --card-foreground: #09090b;
    --popover: #ffffff;
    --popover-foreground: #09090b;
    --primary: #18181b;
    --primary-foreground: #fafafa;
    --secondary: #f4f4f5;
    --secondary-foreground: #18181b;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --accent: #f4f4f5;
    --accent-foreground: #18181b;
    --destructive: #ef4444;
    --border: #e4e4e7;
    --input: #e4e4e7;
    --ring: #18181b;
    --radius: 0.5rem;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: var(--background);
    color: var(--foreground);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ── WRAPPER ── */
  .wrapper {
    display: flex;
    align-items: center;
    gap: 5rem;
    max-width: 860px;
    width: 100%;
    padding: 0 32px;
  }

  /* ── CARD STACK ── */
  .card-stack {
    position: relative;
    width: 300px;
    height: 420px;
    flex-shrink: 0;
  }

  .plan-card {
    position: absolute;
    top: 0;
    width: 264px;
    height: 400px;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform, left, opacity;
    background: var(--card);
  }

  .plan-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: grayscale(100%) brightness(0.92);
    transition: filter 0.5s ease;
  }

  .plan-card .card-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 16px 16px;
    background: linear-gradient(to top, rgba(9,9,11,0.82) 0%, transparent 100%);
  }

  .card-label-name {
    font-size: 0.8rem;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.02em;
  }

  .card-label-tier {
    font-size: 0.65rem;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Active card */
  .plan-card.active {
    left: 18px;
    z-index: 10;
    box-shadow:
      0 0 0 1px var(--border),
      0 4px 6px -1px rgba(0,0,0,0.06),
      0 20px 40px -8px rgba(0,0,0,0.12);
    transform: scale(1) rotate(0deg);
  }
  .plan-card.active img {
    filter: grayscale(30%) brightness(0.95);
  }

  /* Behind left */
  .plan-card.behind-left {
    left: -30px;
    z-index: 5;
    transform: scale(.94) rotate(0deg);
    opacity: 0.55;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* Behind right */
  .plan-card.behind-right {
    left: 70px;
    z-index: 5;
    transform: scale(0.94) rotate(0deg);
    opacity: 0.55;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ── PRICING PANEL ── */
  .pricing-panel {
    flex: 1;
    position: relative;

    min-width: 0;
  }

  /* Tabs – shadcn pill indicators */
  .plan-tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 24px;
    align-items: center;
  }

  .plan-tab {
    height: 5px;
    width: 5px;
    border-radius: 9999px;
    background: var(--border);
    cursor: pointer;
    border: none;
    padding: 0;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .plan-tab.active-tab {
    background: var(--primary);
    width: 24px;
  }

  /* Blur transition */
  .price-content-wrap {
    height: 350px;
    position: relative;
  }
  .price-content { position: relative; height: 100%; }

  .content-block {
    position: absolute;
    top: 0; left: 0; width: 100%;
    transition: opacity 0.38s ease, filter 0.38s ease, transform 0.38s ease;
  }
  .content-block.visible    { opacity: 1; filter: blur(0);    transform: translateY(0);    pointer-events: auto; }
  .content-block.hidden-out { opacity: 0; filter: blur(8px);  transform: translateY(-8px); pointer-events: none; }
  .content-block.hidden-in  { opacity: 0; filter: blur(8px);  transform: translateY(8px);  pointer-events: none; }

  /* Badge – shadcn style */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--secondary);
    color: var(--muted-foreground);
    margin-bottom: 14px;
  }

  /* Plan name */
  .plan-name {
    font-size: 1.875rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--foreground);
    line-height: 1.1;
    margin-bottom: 4px;
  }

  /* Tagline */
  .plan-tagline {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--muted-foreground);
    line-height: 1.5;
  }

  /* Separator */
  .sep {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 18px 0;
  }

  /* Price */
  .price-row {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin-bottom: 2px;
  }

  .price-currency {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--muted-foreground);
    margin-bottom: 6px;
  }

  .price-amount {
    font-size: 3.5rem;
    font-weight: 600;
    letter-spacing: -0.04em;
    color: var(--foreground);
    line-height: 1;
  }

  .price-per {
    font-size: 0.78rem;
    color: var(--muted-foreground);
    font-weight: 400;
    margin-bottom: 8px;
    margin-left: 4px;
  }

  /* Feature list */
  .feature-list {
    list-style: none;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .feature-list li {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--muted-foreground);
  }

  .feature-list li .icon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: var(--foreground);
  }

  /* CTA button – shadcn primary button */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 22px;
    height: 36px;
    padding: 0 16px;
    background: var(--primary);
    color: var(--primary-foreground);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    transition: opacity 0.15s ease, transform 0.15s ease;
    white-space: nowrap;
  }
  .cta-btn:hover { opacity: 0.88; }
  .cta-btn:active { transform: scale(0.98); }

  /* Nav arrows – shadcn ghost/outline button */
  .nav-arrow {
    position: absolute;
    bottom: -90px;
    left: 0;
    display: flex;
    gap: 8px;
  }

  .arrow-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--background);
    color: var(--foreground);
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .arrow-btn:hover {
    background: var(--secondary);
  }

  /* subtle card enter animation */
  @keyframes cardEnter {
    from { transform: scale(0.97) rotate(-1deg); }
    to   { transform: scale(1)    rotate(0deg); }
  }
  .plan-card.active { animation: cardEnter 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- Card Stack -->
  <div class="card-stack" id="cardStack"></div>

  <!-- Pricing Panel -->
  <div class="pricing-panel">
    <div class="plan-tabs" id="planTabs"></div>

    <div class="price-content-wrap">
      <div class="price-content" id="priceContent"></div>
    </div>

    <div class="nav-arrow">
      <button class="arrow-btn" id="prevBtn" aria-label="Previous">&#8592;</button>
      <button class="arrow-btn" id="nextBtn" aria-label="Next">&#8594;</button>
    </div>
  </div>
</div>

<script>
const CHECK_SVG = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

const plans = [
  {
    name: "Starter",
    badge: "Free",
    tagline: "Perfect for individuals and small experiments.",
    price: "0",
    period: "/month",
    features: [
      "1 active project",
      "500 MB storage",
      "Community support",
      "Basic analytics",
      "PNG export only"
    ],
    cta: "Get started",
    img: "https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=600&q=85&auto=format&fit=crop&crop=top"
  },
  {
    name: "Pro",
    badge: "Most popular",
    tagline: "For professionals scaling their workflow.",
    price: "49",
    period: "/month",
    features: [
      "Unlimited projects",
      "50 GB storage",
      "Priority support",
      "Advanced analytics",
      "All export formats",
      "5 team seats"
    ],
    cta: "Start free trial",
    img: "https://images.unsplash.com/photo-1488161628813-04466f872be2?w=600&q=85&auto=format&fit=crop&crop=top"
  },
  {
    name: "Enterprise",
    badge: "Custom",
    tagline: "Built for organisations that need it all.",
    price: "199",
    period: "/month",
    features: [
      "Everything unlimited",
      "1 TB storage",
      "Dedicated account manager",
      "Custom reporting",
      "Unlimited seats",
      "SSO & audit logs"
    ],
    cta: "Contact sales",
    img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&q=85&auto=format&fit=crop&crop=top"
  }
];

let current = 0;
let animating = false;

/* Build cards */
const stack = document.getElementById('cardStack');
plans.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'plan-card';
  card.innerHTML = `
    <img src="${p.img}" alt="${p.name}" />
    <div class="card-label">
      <div class="card-label-name">${p.name}</div>
      <div class="card-label-tier">${p.badge}</div>
    </div>`;
  card.addEventListener('click', () => { if (i !== current) goTo(i); });
  stack.appendChild(card);
});

/* Build pricing blocks */
const priceContent = document.getElementById('priceContent');
plans.forEach((p, i) => {
  const block = document.createElement('div');
  block.className = 'content-block ' + (i === 0 ? 'visible' : 'hidden-in');
  block.innerHTML = `
    <div class="badge">${p.badge}</div>
    <div class="plan-name">${p.name}</div>
    <div class="plan-tagline">${p.tagline}</div>
    <div class="sep"></div>
    <div class="price-row">
      <span class="price-currency">$</span>
      <span class="price-amount">${p.price}</span>
      <span class="price-per">${p.period}</span>
    </div>
    <ul class="feature-list">
      ${p.features.map(f => `<li>${CHECK_SVG}${f}</li>`).join('')}
    </ul>
    <button class="cta-btn">${p.cta}</button>`;
  priceContent.appendChild(block);
});

/* Build tabs */
const tabsEl = document.getElementById('planTabs');
plans.forEach((_, i) => {
  const tab = document.createElement('button');
  tab.className = 'plan-tab ' + (i === 0 ? 'active-tab' : '');
  tab.addEventListener('click', () => goTo(i));
  tabsEl.appendChild(tab);
});

function updateCards(idx) {
  document.querySelectorAll('.plan-card').forEach((card, i) => {
    card.classList.remove('active', 'behind-left', 'behind-right');
    if (i === idx) {
      card.classList.add('active');
    } else {
      const diff = ((i - idx) % plans.length + plans.length) % plans.length;
      card.classList.add(diff === 1 ? 'behind-right' : 'behind-left');
    }
  });
}

function updatePricing(from, to) {
  const blocks = document.querySelectorAll('.content-block');
  const dir = to > from ? 1 : -1;

  blocks[from].classList.remove('visible','hidden-in','hidden-out');
  blocks[from].classList.add('hidden-out');

  const inBlock = blocks[to];
  inBlock.style.cssText = `opacity:0;filter:blur(10px);transform:translateY(${dir * 12}px)`;
  inBlock.classList.remove('visible','hidden-in','hidden-out');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    inBlock.style.cssText = '';
    inBlock.classList.add('visible');
  }));
}

function updateTabs(idx) {
  document.querySelectorAll('.plan-tab').forEach((t, i) =>
    t.classList.toggle('active-tab', i === idx));
}

function goTo(idx) {
  if (idx === current || animating) return;
  animating = true;
  const prev = current;
  current = idx;
  updateCards(current);
  updatePricing(prev, current);
  updateTabs(current);
  setTimeout(() => { animating = false; }, 600);
}

updateCards(0);

document.getElementById('prevBtn').addEventListener('click', () =>
  goTo((current - 1 + plans.length) % plans.length));
document.getElementById('nextBtn').addEventListener('click', () =>
  goTo((current + 1) % plans.length));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goTo((current - 1 + plans.length) % plans.length);
  if (e.key === 'ArrowRight') goTo((current + 1) % plans.length);
});
</script>
</body>
</html>
