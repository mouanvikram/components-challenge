<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite Team Member</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f7f4f2;
        }

        .role-btn:hover {
            background: #f5f0ff;
            border-color: #a78bfa;
            color: #6d28d9;
        }

        .invite-btn:hover {
            background: #5b21b6;
        }

        .member-row {
            transition: padding 0.3s ease;
        }

        .member-row:hover {
            background: #faf8ff;
            cursor: pointer;
            border-radius: 12px;
            padding: 8px 8px;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow p-7 w-full max-w-md">

        <!-- Header -->
        <div class="flex items-start justify-between mb-5">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-xl bg-violet-50 flex items-center justify-center">
                    <i class="hgi hgi-stroke hgi-user-group text-[20px]"></i>
                </div>
                <div>
                    <p class="text-[15px] font-semibold text-gray-800 leading-tight">Invite Team Member</p>
                    <p class="text-[12.5px] text-gray-400 mt-0.5">Share tasks with other users</p>
                </div>
            </div>
            <!-- Close icon (Hugeicons: cancel) -->
            <button class="text-gray-400 hover:text-gray-600 transition-colors p-1 cursor-pointer ">
                <i class="hgi hgi-stroke hgi-cancel-01 font-bold"></i>
            </button>
        </div>

        <!-- Divider -->
        <div class="border-t border-gray-100 mb-5"></div>

        <!-- Email Field -->
        <p class="text-[13px] font-semibold text-gray-600 mb-2">Email</p>
        <div class="flex gap-2 mb-6">
            <div class="flex-1 flex items-center gap-2.5 bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5">
                <!-- Hugeicons: mail -->
                <i class="hgi hgi-stroke hgi-mail-01 text-gray-500"></i>
                <input type="input" placeholder="priya@example.com"
                    class="bg-transparent text-[13.5px] text-gray-600 placeholder-gray-400 outline-none w-full" />
            </div>
            <button
                class="bg-linear-to-b from-violet-600 to-violet-800 shadow-[inset_0px_2px_2px_0px_rgba(255,255,255,0.3)]   text-white text-[13px] font-semibold rounded-xl px-4 py-2.5 cursor-pointer">
                Invite Member
            </button>
        </div>

        <!-- Member List -->
        <p class="text-[13px] font-semibold text-gray-600 mb-3">Member Lists</p>

        <div class="flex flex-col gap-1 ">

            <!-- Member 1 -->
            <div class="member-row flex items-center justify-between py-2 transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center text-violet-600 font-semibold text-[14px] flex-shrink-0">
                        A
                    </div>
                    <div>
                        <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Aarav Sharma</p>
                        <p class="text-[11.5px] text-gray-400">aaravsharma@gmail.com</p>
                    </div>
                </div>
                <button
                    class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full pr-3 py-1.5 pl-4 text-[12px] text-gray-600 font-medium transition-colors">
                    Assistant
                    <i class="hgi hgi-stroke hgi-arrow-down-01 text-[14px]"></i>
                </button>
            </div>

            <!-- Member 2 -->
            <div class="member-row flex items-center justify-between py-2 transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center text-violet-600 font-semibold text-[14px] flex-shrink-0">
                        P
                    </div>
                    <div>
                        <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Priya Nair</p>
                        <p class="text-[11.5px] text-gray-400">priyanair@gmail.com</p>
                    </div>
                </div>
                <button
                    class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full pr-3 py-1.5 pl-4  text-[12px] text-gray-600 font-medium transition-colors">
                    Junior Level
                    <i class="hgi hgi-stroke hgi-arrow-down-01 text-[14px]"></i>
                </button>
            </div>

            <!-- Member 3 -->
            <div class="member-row flex items-center justify-between py-2 transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center text-violet-600 font-semibold text-[14px] flex-shrink-0">
                        R
                    </div>
                    <div>
                        <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Rohan Mehta</p>
                        <p class="text-[11.5px] text-gray-400">rohanmehta@gmail.com</p>
                    </div>
                </div>
                <button
                    class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full pr-3 py-1.5 pl-4  text-[12px] text-gray-600 font-medium transition-colors">
                    Senior Level
                    <i class="hgi hgi-stroke hgi-arrow-down-01 text-[14px]"></i>
                </button>
            </div>

            <!-- Member 4 -->
            <div class="member-row flex items-center justify-between py-2 transition-colors">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center text-violet-600 font-semibold text-[14px] flex-shrink-0">
                        D
                    </div>
                    <div>
                        <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Divya Krishnan</p>
                        <p class="text-[11.5px] text-gray-400">divyakrishnan@gmail.com</p>
                    </div>
                </div>
                <button
                    class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full pr-3 py-1.5 pl-4  text-[12px] text-gray-600 font-medium transition-colors">
                    Senior Level
                    <i class="hgi hgi-stroke hgi-arrow-down-01 text-[14px]"></i>
                </button>
            </div>

        </div>
    </div>

</body>

</html>
