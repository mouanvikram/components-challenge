<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Image Modal - Dark Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        /* Custom animation curve for the springy pop-up effect */
        .ease-spring {
            transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4 font-sans text-gray-200 antialiased">

    <!-- Modal Container -->
    <div class="bg-gray-900 rounded-2xl  w-full max-w-[460px] p-6 sm:p-8">
        
        <!-- Header -->
        <div class="flex items-start justify-between">
            <div class="flex items-center gap-4">
                <!-- Icon container -->
                <div class="p-2 rounded-xl bg-purple-800/10  flex items-center justify-center shadow-inner shadow-purple-500/5">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-semibold text-white tracking-tight">Upload Image</h2>
                    <p class="text-sm text-gray-400 mt-0.5">Upload an image to continue.</p>
                </div>
            </div>
            <!-- Close button -->
            <button class="text-gray-500 hover:text-gray-300 hover:bg-gray-800 rounded-lg p-1.5 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Subtle separator -->
        <div class="h-px w-full bg-gray-800 my-6"></div>

        <!-- Drag & Drop Zone -->
        <div class="group border-2 border-dashed border-gray-700 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:border-purple-500/50 hover:bg-gray-850/50 transition-all duration-300 relative overflow-hidden">
            
            <!-- Micro-interaction Animation Container -->
            <div class="relative w-20 h-20 mb-3 flex items-end justify-center">
                
                <!-- The "White Card" that pops up (Hidden behind folder initially) -->
                <!-- Uses custom .ease-spring class defined in <style> for a slight bounce -->
                <div class="absolute bottom-2 w-11 h-14 bg-gray-100 rounded shadow-md flex flex-col p-1.5 gap-1 transform transition-all duration-500 ease-spring group-hover:-translate-y-8 group-hover:rotate-6 group-hover:scale-105 z-0">
                    <!-- Lines on the document -->
                    <div class="w-full h-1 bg-gray-300 rounded-full"></div>
                    <div class="w-3/4 h-1 bg-gray-300 rounded-full"></div>
                    <div class="w-5/6 h-1 bg-gray-300 rounded-full mt-auto mb-1"></div>
                </div>

                <!-- The Folder Icon (Sits in front) -->
                <svg class="w-16 h-16 text-gray-500 relative z-10 transition-transform duration-300 group-hover:scale-105 drop-shadow-xl" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                </svg>
            </div>

            <!-- Text Content -->
            <p class="text-gray-200 font-medium text-base mb-1">Drag & drop or click to upload</p>
            <p class="text-xs text-gray-500">JPG, PNG, or SVG - Max 5 MB</p>
        </div>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-grow h-px bg-gray-800"></div>
            <span class="px-3 text-xs font-medium text-gray-500">Or</span>
            <div class="flex-grow h-px bg-gray-800"></div>
        </div>

        <!-- Upload via URL Section -->
        <div class="mb-8">
            <div class="flex items-center gap-1.5 mb-2">
                <label for="url-input" class="text-sm font-medium text-gray-300 block">Upload via URL</label>
                <!-- Info Icon -->
                <svg class="w-4 h-4 text-gray-500 hover:text-gray-300 cursor-help transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <!-- Link Icon -->
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                </div>
                <input type="text" id="url-input" placeholder="Paste image link here" class="w-full pl-10 pr-4 py-2.5 bg-gray-950/50 border border-gray-700 rounded-lg text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all shadow-inner">
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="flex justify-end gap-3 mt-4">
            <button type="button" class="px-5 py-2.5 text-sm font-medium text-gray-300 bg-transparent border border-gray-700 rounded-lg hover:bg-gray-800 hover:text-white transition-all focus:outline-none focus:ring-2 focus:ring-gray-700">
                Cancel
            </button>
            <button type="button" class="px-6 py-2.5 text-sm font-medium text-white bg-purple-600 rounded-lg hover:bg-purple-500 transition-all shadow-[0_0_15px_rgba(147,51,234,0.3)] hover:shadow-[0_0_20px_rgba(147,51,234,0.5)] focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-gray-900 active:scale-95">
                Next
            </button>
        </div>

    </div>

</body>
</html>
