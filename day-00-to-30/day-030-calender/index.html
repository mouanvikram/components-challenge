<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deck Calendar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Geist Mono", monospace;
            font-optical-sizing: auto;
        }

        .day-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            line-height: 1;
        }

        .deck-card {
            position: absolute;
            width: 300px;
            height: 400px;
            top: 0;
            left: 0;
            border-radius: 1rem;
            border: 1px solid #e8e2da;
            background: #fff;
            transform-origin: bottom left;
            will-change: transform, opacity;
        }

        .deck-card.pos-0 {
            z-index: 10;
            transform: rotate(0deg);
            opacity: 1;
        }

        .deck-card.pos-1 {
            z-index: 2;
            transform: rotate(0.9deg);
            opacity: 1;
        }

        .deck-card.pos-2 {
            z-index: 1;
            transform: rotate(1.8deg);
            opacity: 1;
        }

        @keyframes cardOut {
            0% {
                transform: rotate(0deg);
                opacity: 1;
            }

            80% {
                transform: rotate(-6deg);
                filter: blur(5px);
                opacity: 1;
            }

            100% {
                transform: rotate(-22deg);
                opacity: 0;
            }
        }

        @keyframes card1to0 {
            0% {
                transform: rotate(0.9deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        @keyframes card2to1 {
            0% {
                transform: rotate(1.8deg);
            }

            100% {
                transform: rotate(0.9deg);
            }
        }

        @keyframes card0to2 {
            0% {
                transform: rotate(-22deg);
                opacity: 0;
            }

            60% {
                opacity: 0;
            }

            100% {
                transform: rotate(1.8deg);
                opacity: 1;
            }
        }

        .anim-out {
            animation: cardOut 0.3s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }

        .anim-1to0 {
            animation: card1to0 0.42s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        .anim-2to1 {
            animation: card2to1 0.42s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        .anim-0to2 {
            animation: card0to2 0.55s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        .active {
            padding: 20px 20px 14px 20px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body class="bg-[#f7f7f5] min-h-screen flex flex-col items-center justify-center py-10">

    <div class="relative mb-8" style="width:300px; height:400px;">
        <div id="card2" class="deck-card pos-2"></div>
        <div id="card1" class="deck-card pos-1"></div>
        <!-- card0 starts as front and holds the content -->
        <div id="card0" class="deck-card pos-0 active">
            <div id="calContent">

                <div class="flex-shrink-0">
                    <div id="cardMonth" class="text-[10px] tracking-[0.18em] uppercase text-[#a09286] mb-0.5"></div>
                    <div id="cardYear" class="text-[22px] font-normal text-[#2a2520] leading-none mb-3"></div>
                </div>

                <div class="h-px bg-[#ece8e2] mt-2 flex-shrink-0"></div>

                <div class="grid grid-cols-7 flex-shrink-0 mt-3">
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Su
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Mo
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Tu
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">We
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Th
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Fr
                    </div>
                    <div class="text-center text-[8.5px] font-medium tracking-widest uppercase text-[#c8bfb4] py-0.5">Sa
                    </div>
                </div>

                <div id="daysGrid" class="grid grid-cols-7 flex-1 min-h-0"></div>

            </div>
        </div>
    </div>

    <!-- Nav -->
    <div class="flex items-center gap-6">
        <button id="prevBtn"
            class="w-10 h-10 bg-white border border-[#d8d2ca] rounded-lg flex items-center justify-center text-[#5a524a] hover:bg-[#ece8e2] cursor-pointer"></button>
        <span id="navLabel" class="text-sm text-[#9b8f82] tracking-wide min-w-[110px] text-center"></span>
        <button id="nextBtn"
            class="w-10 h-10 bg-white border border-[#d8d2ca] rounded-lg flex items-center justify-center text-[#5a524a] hover:bg-[#ece8e2] cursor-pointer"></button>
    </div>

    <script>
        const MONTHS = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        let now = new Date();
        let cur = { y: now.getFullYear(), m: now.getMonth() };
        let animating = false;
        let front = 0;

        function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
        function firstDay(y, m) { return new Date(y, m, 1).getDay(); }

        function getCards() {
            const cards = document.querySelectorAll('.deck-card');

            let pos0, pos1, pos2;

            cards.forEach(card => {
                if (card.classList.contains('pos-0')) pos0 = card;
                else if (card.classList.contains('pos-1')) pos1 = card;
                else if (card.classList.contains('pos-2')) pos2 = card;
            });

            return [pos0, pos1, pos2];
        }

        function renderGrid(y, m) {
            const today = new Date();
            const isNow = today.getFullYear() === y && today.getMonth() === m;
            const fd = firstDay(y, m);
            const dim = daysInMonth(y, m);
            const prevDim = daysInMonth(y, m === 0 ? 11 : m - 1);

            document.getElementById('cardMonth').textContent = MONTHS[m];
            document.getElementById('cardYear').textContent = y;
            document.getElementById('navLabel').textContent = MONTHS[m].slice(0, 3) + ' ' + y;

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            function makeCell(text, colorClass, isToday) {
                const el = document.createElement('div');
                el.className = 'day-cell ' + (isToday ? 'bg-[#2a2520] text-white font-medium' : colorClass);
                el.textContent = text;
                return el;
            }

            for (let i = 0; i < fd; i++)
                grid.appendChild(makeCell(prevDim - fd + i + 1, 'text-[#d4cfc8]', false));

            for (let d = 1; d <= dim; d++) {
                const isSun = new Date(y, m, d).getDay() === 0;
                const isTod = isNow && d === today.getDate();
                grid.appendChild(makeCell(d, isSun ? 'text-[#c17a5a]' : 'text-[#3a342d]', isTod));
            }

            const remainder = (fd + dim) % 7;
            if (remainder > 0)
                for (let d = 1; d <= 7 - remainder; d++)
                    grid.appendChild(makeCell(d, 'text-[#d4cfc8]', false));
        }

        function go(dir) {
            if (animating) return false;
            animating = true;

            const fc = document.querySelector('.deck-card.pos-0');
            const mc = document.querySelector('.deck-card.pos-1');
            const bc = document.querySelector('.deck-card.pos-2');

            // Start animations
            fc.classList.add('anim-out');

            mc.classList.add('anim-1to0');

            bc.classList.add('anim-2to1');

            console.log(fc, mc, bc)
            // Midway: move content into new front card, update data, send old front to back
            setTimeout(() => {
                fc.classList.remove('pos-0');
                mc.classList.remove('pos-1');
                bc.classList.remove('pos-2');

                // Advance month
                cur.m += dir;
                if (cur.m > 11) { cur.m = 0; cur.y++; }
                if (cur.m < 0) { cur.m = 11; cur.y--; }

                // Move content node into the new front card (mc)
                const contentNode = document.getElementById('calContent');
                mc.appendChild(contentNode);
                mc.style.padding = '20px 20px 14px 20px';
                mc.style.display = 'flex';
                mc.style.flexDirection = 'column';

                // Strip layout styles from old front
                fc.style.padding = '';
                fc.style.display = '';
                fc.style.flexDirection = '';

                renderGrid(cur.y, cur.m);

                // Send old front card to the back of the deck
                fc.classList.remove('anim-out');
                fc.classList.add('anim-0to2');

                setTimeout(() => {
                    fc.classList.remove('anim-out', 'anim-0to2');
                    mc.classList.remove('anim-1to0');
                    bc.classList.remove('anim-2to1');

                    fc.className = 'deck-card pos-2';
                    mc.className = 'deck-card pos-0';
                    bc.className = 'deck-card pos-1';

                    // front = mIdx;
                    animating = false;
                }, 0);
                console.log(fc, mc, bc)
            }, 360);
        }

        document.getElementById('nextBtn').addEventListener('click', () => go(1));
        document.getElementById('prevBtn').addEventListener('click', () => go(-1));

        renderGrid(cur.y, cur.m);
    </script>
</body>

</html>
