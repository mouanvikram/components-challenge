<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  .btn-gradient {
    background: linear-gradient(to bottom, #ffffff, #f0f0f0);
  }
  .btn-gradient-blue {
    background: linear-gradient(to bottom, #5b96f8, #2563eb);
  }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="flex flex-col gap-4 items-center">

    <!-- Row 1 -->
    <div class="flex gap-2.5 items-center">
      <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-800 shadow-sm hover:brightness-95 active:scale-95 transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Copy link
      </button>
      <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-800 shadow-sm hover:brightness-95 active:scale-95 transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Login
      </button>
      <button class="btn-gradient-blue flex items-center gap-2 px-4 py-2.5 border border-blue-700 rounded-xl text-sm font-semibold text-white shadow-sm hover:brightness-95 active:scale-95 transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Sign Up
      </button>
    </div>

    <!-- Row 2 -->
    <div class="flex gap-2.5 items-center">
      <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-800 hover:brightness-95 active:scale-95 transition-all border-r border-gray-200">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
          Documents
        </button>
        <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-800 hover:brightness-95 active:scale-95 transition-all border-r border-gray-200">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 17 21 12 16 7"/><path d="M21 12H9"/><path d="M3 7v4a1 1 0 0 0 1 1h3"/><path d="M3 17v-4"/></svg>
          Export
        </button>
        <button class="btn-gradient flex items-center justify-center w-10 h-10 text-gray-800 hover:brightness-95 active:scale-95 transition-all">
          <svg width="15" height="4" viewBox="0 0 15 4" fill="currentColor"><circle cx="1.5" cy="2" r="1.5"/><circle cx="7.5" cy="2" r="1.5"/><circle cx="13.5" cy="2" r="1.5"/></svg>
        </button>
      </div>

      <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        <button class="btn-gradient flex items-center justify-center w-10 h-10 text-gray-800 hover:brightness-95 active:scale-95 transition-all border-r border-gray-200">
          <svg width="7" height="13" viewBox="0 0 7 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 1 1 6.5 6 12"/></svg>
        </button>
        <button class="btn-gradient flex items-center justify-center w-10 h-10 text-gray-800 hover:brightness-95 active:scale-95 transition-all">
          <svg width="7" height="13" viewBox="0 0 7 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 6 6.5 1 12"/></svg>
        </button>
      </div>

    </div>

    <!-- Row 3 -->
    <div class="flex gap-2.5 items-center">
      <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-800 shadow-sm hover:brightness-95 active:scale-95 transition-all">
        Cancel
      </button>
      <button class="btn-gradient-blue flex items-center gap-2 px-4 py-2.5 border border-blue-700 rounded-xl text-sm font-semibold text-white shadow-sm hover:brightness-95 active:scale-95 transition-all">
        Done
      </button>
      <button class="btn-gradient flex items-center justify-center w-10 h-10 border border-gray-200 rounded-xl shadow-sm hover:brightness-95 active:scale-95 transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-800 shadow-sm hover:brightness-95 active:scale-95 transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Like
        <span class="bg-gray-100 text-gray-500 text-xs font-bold px-1.5 py-0.5 rounded-md">2</span>
      </button>
    </div>

    <!-- Row 4: arrow group + Forward -->
    <div class="flex gap-2.5 items-center">

      <!-- Grouped: Left | Right arrows -->
      <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        <button class="btn-gradient flex items-center justify-center w-10 h-10 text-gray-800 hover:brightness-95 active:scale-95 transition-all border-r border-gray-200">
          <svg width="7" height="13" viewBox="0 0 7 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 1 1 6.5 6 12"/></svg>
        </button>
        <button class="btn-gradient flex items-center justify-center w-10 h-10 text-gray-800 hover:brightness-95 active:scale-95 transition-all">
          <svg width="7" height="13" viewBox="0 0 7 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 6 6.5 1 12"/></svg>
        </button>
      </div>

      <button class="btn-gradient flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-800 shadow-sm hover:brightness-95 active:scale-95 transition-all">
        Forward
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </button>
    </div>

  </div>

</body>
</html>
