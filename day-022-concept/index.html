<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <title>Concept</title>
    <style>
        .corners {
            top: 0;
            left: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #757474;
        }

        .top-l {
            top: 0px;
            left: 0px;
        }

        .top-r {
            top: 0px;
            right: 0px;
            border-left: none;
            border-bottom: none;
        }

        .bottom-l {
            bottom: 0px;
            left: 0px;
            border-right: none;
            border-top: none;
        }

        .bottom-r {
            bottom: 0px;
            right: 0px;
            border-left: none;
            border-top: none;
        }

        .item {
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
        }

        .item:hover {
            border: 1px solid #d1d1d1;
            background: #f3f3f3;
        }

        .separator {
            border: 0.5px solid #ededed;
            /* background: #d1d1d1; */
            margin: 2px 0;
        }

    </style>
</head>

<body>
    <div class="w-full h-screen flex items-center justify-center bg-gray-100">
        <div class="p-4 border border-gray-300 relative bg-white flex flex-col gap-2">
            <div class="absolute corners">
                <div class="top-l corner"></div>
                <div class="top-r corner"></div>
                <div class="bottom-l corner"></div>
                <div class="bottom-r corner"></div>
            </div>
            <div class="w-70 input text-xs">
                <input type="text" placeholder="SEARCH ACTIONS. . .">

            </div>
            <div class="separator"></div>
            <div class="flex flex-col">

                <div class="item w-70 flex gap-2">
                    <div class="icon"><i class="hgi hgi-stroke hgi-file-01"></i></div>
                    <span class="text-sm">OPEN</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">OPEN IN NEW TAB</span>
                </div>
            </div>
            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2">
                    <div class="icon"><i class="hgi hgi-stroke hgi-file-01"></i></div>
                    <span class="text-sm">MOVE TO</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">ADD LABEL</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <div class="icon"><i class="hgi hgi-stroke hgi-file-01"></i></div>
                    <span class="text-sm">MARK AS</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">PRIORITY</span>
                </div>
            </div>
            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">SCHEDULE REPLY</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">CREATE TASK</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">ADD TO CALENDAR</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">SNOOZE</span>
                </div>
            </div>

            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">COPY LINK</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">DOWNLOAD ATTACHMENTS</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">PRINT</span>
                </div>
            </div>
            <div class="flex"></div>
        </div>
    </div>
</body>

</html>
