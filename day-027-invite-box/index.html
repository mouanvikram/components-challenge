<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invite Team Member</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f0ede8; }
    .role-btn:hover { background: #f5f0ff; border-color: #a78bfa; color: #6d28d9; }
    .invite-btn:hover { background: #5b21b6; }
    .member-row:hover { background: #faf8ff; border-radius: 12px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="bg-white rounded-2xl shadow-lg p-7 w-full max-w-md">

    <!-- Header -->
    <div class="flex items-start justify-between mb-5">
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-xl bg-violet-50 flex items-center justify-center">
          <!-- Hugeicons: user-group -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none">
            <path d="M13 7C13 9.20914 11.2091 11 9 11C6.79086 11 5 9.20914 5 7C5 4.79086 6.79086 3 9 3C11.2091 3 13 4.79086 13 7Z" stroke="#7c3aed" stroke-width="1.6"/>
            <path d="M15 11C17.2091 11 19 9.20914 19 7C19 4.79086 17.2091 3 15 3" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M11 14H7C4.23858 14 2 16.2386 2 19C2 20.1046 2.89543 21 4 21H14C15.1046 21 16 20.1046 16 19C16 16.2386 13.7614 14 11 14Z" stroke="#7c3aed" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M17 14C19.7614 14 22 16.2386 22 19C22 20.1046 21.1046 21 20 21H18" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <p class="text-[15px] font-semibold text-gray-800 leading-tight">Invite Team Member</p>
          <p class="text-[12.5px] text-gray-400 mt-0.5">Share tasks with other users</p>
        </div>
      </div>
      <!-- Close icon (Hugeicons: cancel) -->
      <button class="text-gray-400 hover:text-gray-600 transition-colors p-1">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path d="M19 5L5 19M5 5L19 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Divider -->
    <div class="border-t border-gray-100 mb-5"></div>

    <!-- Email Field -->
    <p class="text-[13px] font-semibold text-gray-600 mb-2">Email</p>
    <div class="flex gap-2 mb-6">
      <div class="flex-1 flex items-center gap-2.5 bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5">
        <!-- Hugeicons: mail -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path d="M2 6C2 4.89543 2.89543 4 4 4H20C21.1046 4 22 4.89543 22 6V18C22 19.1046 21.1046 20 20 20H4C2.89543 20 2 19.1046 2 18V6Z" stroke="#9ca3af" stroke-width="1.6"/>
          <path d="M2 7L12 13L22 7" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input
          type="email"
          placeholder="priya@example.com"
          class="bg-transparent text-[13.5px] text-gray-600 placeholder-gray-400 outline-none w-full"
        />
      </div>
      <button class="invite-btn bg-violet-600 text-white text-[13px] font-semibold rounded-xl px-4 py-2.5 whitespace-nowrap transition-colors">
        Invite Member
      </button>
    </div>

    <!-- Member List -->
    <p class="text-[13px] font-semibold text-gray-600 mb-3">Member Lists</p>

    <div class="flex flex-col gap-1">

      <!-- Member 1 -->
      <div class="member-row flex items-center justify-between px-2 py-2 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-rose-100 flex items-center justify-center text-rose-600 font-semibold text-[14px] flex-shrink-0">
            A
          </div>
          <div>
            <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Aarav Sharma</p>
            <p class="text-[11.5px] text-gray-400">aaravsharma@gmail.com</p>
          </div>
        </div>
        <button class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full px-3 py-1.5 text-[12px] text-gray-600 font-medium transition-colors">
          Assistant
          <!-- Hugeicons: arrow-down-01 -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="none">
            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Member 2 -->
      <div class="member-row flex items-center justify-between px-2 py-2 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600 font-semibold text-[14px] flex-shrink-0">
            P
          </div>
          <div>
            <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Priya Nair</p>
            <p class="text-[11.5px] text-gray-400">priyanair@gmail.com</p>
          </div>
        </div>
        <button class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full px-3 py-1.5 text-[12px] text-gray-600 font-medium transition-colors">
          Junior Level
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="none">
            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Member 3 -->
      <div class="member-row flex items-center justify-between px-2 py-2 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-teal-100 flex items-center justify-center text-teal-600 font-semibold text-[14px] flex-shrink-0">
            R
          </div>
          <div>
            <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Rohan Mehta</p>
            <p class="text-[11.5px] text-gray-400">rohanmehta@gmail.com</p>
          </div>
        </div>
        <button class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full px-3 py-1.5 text-[12px] text-gray-600 font-medium transition-colors">
          Senior Level
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="none">
            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Member 4 -->
      <div class="member-row flex items-center justify-between px-2 py-2 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center text-violet-600 font-semibold text-[14px] flex-shrink-0">
            D
          </div>
          <div>
            <p class="text-[13.5px] font-semibold text-gray-800 leading-snug">Divya Krishnan</p>
            <p class="text-[11.5px] text-gray-400">divyakrishnan@gmail.com</p>
          </div>
        </div>
        <button class="role-btn flex items-center gap-1.5 border border-gray-200 rounded-full px-3 py-1.5 text-[12px] text-gray-600 font-medium transition-colors">
          Senior Level
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="none">
            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
