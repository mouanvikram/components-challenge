<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Folder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .front {
            transform-origin: bottom;
            transform: perspective(600px) rotateX(-30deg) translateY(5px);
            transition: all 0.4s ease-in-out;
        }

        .folder:hover .front {
            transform: perspective(600px) rotateX(-40deg) translateY(5px);
        }

        .middle {
            transform: translateY(-8px);
            transition: all 0.4s ease-in-out;
        }

        .folder:hover .middle {
            transform: translateY(-14px);
        }

        .card1 {
            transform: rotateZ(-4deg);
            transition: all 0.5s ease-in-out;
        }

        .card2 {
            transform: rotateZ(0deg);
            transition: all 0.5s ease-in-out;
        }

        .card3 {
            transform: rotateZ(2deg);
            transition: all 0.5s ease-in-out;
        }
        .folder:hover .card2{
            transform: rotateZ(0deg) translateY(-5px);
        }
        .folder:hover .card3{
            transform: rotateZ(5deg) translateY(-10px);
        }
    </style>
</head>

<body>
    <div class="w-full h-screen flex items-center justify-center bg-gray-800">
        <div class="folder relative w-[220px] h-[170px]">

            <!-- back -->
            <div class="back absolute top-0 left-0 w-[220px] h-[170px] bg-yellow-600 rounded-xl "></div>
            <!-- middle section -->
            <div class="middle absolute  w-[220px] h-[180px] flex items-center justify-center">
                <div class="relative w-[220px] h-[180px] flex items-center justify-center">
                    <div
                        class="absolute card1 w-[190px] h-[140px] bg-white rounded-lg flex gap-2 p-2 z-[2] shadow-[0px_0px_2px_2px_rgba(0,0,0,0.1)]">
                        <div class="w-1/2 h-1/2 bg-red-200 rounded"></div>
                        <div class="w-1/2 h-1/2 grid grid-cols-2 gap-2">
                            <div class="w-full h-full bg-yellow-200 rounded"></div>
                            <div class="w-full h-full bg-blue-200 rounded"></div>
                            <div class="w-full h-full bg-slate-200 rounded"></div>
                            <div class="w-full h-full bg-green-200 rounded"></div>
                        </div>

                    </div>
                    <div
                        class="absolute card2 w-[190px] h-[140px] bg-white rounded-lg flex gap-2 p-2 z-[1] shadow-[0px_0px_2px_2px_rgba(0,0,0,0.1)]">
                    </div>
                    <div
                        class="absolute card3 w-[190px] h-[140px] bg-white rounded-lg flex gap-2 p-2 z-[0] shadow-[0px_0px_2px_2px_rgba(0,0,0,0.1)]">

                    </div>
                </div>

            </div>
            <!-- front   -->
            <div class="front absolute bottom-0 left-0 w-[220px] h-[150px] rounded-xl bg-linear-to-b from-yellow-500 to-yellow-700"></div>
        </div>
    </div>

</body>

</html>
