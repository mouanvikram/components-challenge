<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .corners {
            top: 0;
            left: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #757474;
        }

        .top-l {
            top: 0px;
            left: 0px;
        }

        .top-r {
            top: 0px;
            right: 0px;
            border-left: none;
            border-bottom: none;
        }

        .bottom-l {
            bottom: 0px;
            left: 0px;
            border-right: none;
            border-top: none;
        }

        .bottom-r {
            bottom: 0px;
            right: 0px;
            border-left: none;
            border-top: none;
        }

        .separator {
            border: 0.5px solid #ededed;
            /* background: #d1d1d1; */
            margin: 2px 0;
        }

        .nav-items a {
            border: 1px solid transparent;
            padding: 5px 10px;
            text-transform: uppercase;
            font-size: smaller;
            /* transition: backgroun 0.3s ease; */
        }

        .nav-items a:nth-child(1) {
            border: 1px solid #D1D5DB;
        }

        .nav-items a:hover {
            color: black;
            border: 1px solid #d1d1d1;
            background: #f3f3f3;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0E14;
        }

        ::-webkit-scrollbar-thumb {
            background: #222834;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }

        body {
            background-color: #F9FAFB;
            opacity: 1;
            background: repeating-linear-gradient(-45deg, #f3f3f3, #f3f3f3 1px, #F9FAFB 1px, #F9FAFB 8px);
        }
    </style>
</head>

<body class="bg-gray-100 font-sans h-screen flex overflow-hidden gap-4 p-4">

    <!-- Sidebar (Dashboard Layout) -->
    <aside class="hidden flex-[1] md:flex flex-col w-64">
        <div class="w-full h-full bg-white border border-gray-300  relative">
            <div class="absolute corners">
                <div class="top-l corner"></div>
                <div class="top-r corner"></div>
                <div class="bottom-l corner"></div>
                <div class="bottom-r corner"></div>
            </div>
            <div class="p-4 flex items-center gap-3">
                <div
                    class="text-[18px] font-bold flex items-center justify-center bg-gray-50 border border-gray-300 px-2  rounded ">
                    <i class="hgi hgi-stroke hgi-coins-02"></i>
                </div>
                <h1 class="text- font-bold tracking-wide">COIN PULSE</h1>
            </div>
            <nav class="flex-1 px-2 mt-4 flex flex-col justify-between">
                <div class="nav-items flex flex-col gap-1">
                    <a href="#"
                        class="flex items-center gap-3 px-4 py-2 bg-[#f3f3f3] border border-gray-300 text-gray-800">
                        <i class="hgi hgi-stroke hgi-market-analysis"></i>
                        <span class="font-medium">Market</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400"><i
                            class="hgi hgi-stroke hgi-wallet-01"></i>
                        <span class="font-medium">Portfolio</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400 justify-between">
                        <div class="flex gap-3"><i class="hgi hgi-stroke hgi-news"></i>
                            <span class="font-medium">News</span>
                        </div>
                        <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                    </a>
                    <!-- seprator -->
                    <div class="separator my-2 "></div>

                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400"><i
                            class="hgi hgi-stroke hgi-right-to-left-list-triangle"></i>
                        <span class="font-medium">Watchlist</span>
                    </a><a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400 justify-between">
                        <div class="flex gap-3"><i class="hgi hgi-stroke hgi-bitcoin-up-02"></i>
                            <span class="font-medium">Trending</span>
                        </div>
                        <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400 justify-between">
                        <div class="flex gap-3">
                            <i class="hgi hgi-stroke hgi-filter"></i>
                            <span class="font-medium">Screener</span>
                        </div>
                        <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                    </a>

                    <div class="separator my-2 "></div>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400">
                        <i class="hgi hgi-stroke hgi-settings-01"></i>
                        <span class="font-medium">Settings</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-400">
                        <i class="hgi hgi-stroke hgi-user-circle-02"></i>
                        <span class="font-medium">Profile</span>
                    </a>
                </div>
            </nav>
        </div>
    </aside>

    <!-- main -->
    <main class="flex-[5]">
        <div class="w-full h-full flex flex-col gap-4">
            <!-- header area -->
            <header class="w-full bg-white relative border  border-gray-300 p-4 flex items-center gap-3">
                <div class="absolute corners">
                    <div class="top-l corner"></div>
                    <div class="top-r corner"></div>
                    <div class="bottom-l corner"></div>
                    <div class="bottom-r corner"></div>
                </div>
                <div class="w-full">
                    <h2 class="text-2xl font-bold ">Market Overview</h2>
                    <p class="text-sm text-gray-400 mt-1">Live updates for top 50 cryptocurrencies</p>
                </div>
                <div class="relative w-full">
                    <i
                        class="hgi hgi-stroke hgi-search-01 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Search by coin or symbol..."
                        class="w-full pl-9 pr-4 py-2 text-sm text-gray-800 border border-gray-500  focus:outline-none focus:ring-1 focus:ring-gray-800  text-gray-200 placeholder-gray-500">
                </div>
                <div class="relative">
                    <select id="currencySelect"
                        class="appearance-none px-4 py-2  border border-gray-300 text-sm font-medium focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer text-gray-800">
                        <option value="usd">USD ($)</option>
                        <option value="eur">EUR (€)</option>
                        <option value="inr">INR (₹)</option>
                    </select>
                    <i
                        class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                </div>
            </header>
            <!-- table area -->
            <div class="bg-white flex-1 border border-gray-300 overflow-y-auto p-4 sm:p-6 relative ">
                <div class="absolute corners">
                    <div class="top-l corner"></div>
                    <div class="top-r corner"></div>
                    <div class="bottom-l corner"></div>
                    <div class="bottom-r corner"></div>
                </div>

            </div>
        </div>
    </main>



</body>

</html>
