<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
    <title>Concept</title>
    <style>
        .corners {
            top: 0;
            left: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #757474;
        }

        .top-l {
            top: 0px;
            left: 0px;
        }

        .top-r {
            top: 0px;
            right: 0px;
            border-left: none;
            border-bottom: none;
        }

        .bottom-l {
            bottom: 0px;
            left: 0px;
            border-right: none;
            border-top: none;
        }

        .bottom-r {
            bottom: 0px;
            right: 0px;
            border-left: none;
            border-top: none;
        }

        .item {
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
            color: #908f8f;
            font-weight: 500;
        }

        .item:hover {
            color: black;
            border: 1px solid #d1d1d1;
            background: #f3f3f3;
        }

        .separator {
            border: 0.5px solid #ededed;
            /* background: #d1d1d1; */
            margin: 2px 0;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="w-full mt-10  flex items-center justify-center ">
        <div class="p-4 border border-gray-300 relative bg-white flex flex-col gap-2">
            <div class="absolute corners">
                <div class="top-l corner"></div>
                <div class="top-r corner"></div>
                <div class="bottom-l corner"></div>
                <div class="bottom-r corner"></div>
            </div>
            <div class="w-70 flex">
                <input class="w-full pl-3 text-sm font-semibold" type="text" placeholder="SEARCH ACTIONS. . .">
                <div class="flex gap-2">
                    <div class="border border-gray-300 px-2 py-1 text-sm bg-gray-50 text-gray-500"><i class="hgi hgi-stroke hgi-command"></i></div>
                    <div class="border border-gray-300 px-2 py-1 text-sm bg-gray-50 text-gray-500">K</div>
                </div>
            </div>
            <div class="separator"></div>
            <div class="flex flex-col">

                <div class="item w-70 flex gap-2">
                    <div class="icon"><i class="hgi hgi-stroke hgi-file-01"></i></div>
                    <span class="text-sm">OPEN</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">OPEN IN NEW TAB</span>
                </div>
            </div>
            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2 justify-between">
                    <div class="flex gap-2">
                        <div class="icon"><i class="hgi hgi-stroke hgi-folder-export"></i></div>
                        <span class="text-sm">MOVE TO</span>
                    </div> <i class="hgi hgi-stroke hgi-arrow-right-01"></i>

                </div>
                <div class="item w-70 flex gap-2 justify-between">
                    <div class="flex gap-2">
                        <i class="hgi hgi-stroke hgi-label-important"></i>
                        <span class="text-sm">ADD LABEL</span>
                    </div>
                    <i class="hgi hgi-stroke hgi-arrow-right-01"></i>

                </div>
                <div class="item w-70 flex gap-2 justify-between">
                    <div class="flex gap-2"><i class="hgi hgi-stroke hgi-bookmark-check-01"></i>
                        <span class="text-sm">MARK AS</span>
                    </div>

                    <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                </div>
                <div class="item w-70 flex gap-2 justify-between">
                    <div class="flex gap-2"><i class="hgi hgi-stroke hgi-alert-circle"></i>
                        <span class="text-sm">PRIORITY</span>
                    </div>
                    <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                </div>
            </div>
            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-time-schedule"></i>
                    <span class="text-sm">SCHEDULE REPLY</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-note-add"></i>
                    <span class="text-sm">CREATE TASK</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-calendar-04"></i>
                    <span class="text-sm">ADD TO CALENDAR</span>
                </div>
                <div class="item w-70 flex gap-2 justify-between">
                    <div class="flex gap-2"><i class="hgi hgi-stroke hgi-notification-snooze-02"></i>
                        <span class="text-sm">SNOOZE</span>
                    </div>
                    <i class="hgi hgi-stroke hgi-arrow-right-01"></i>
                </div>
            </div>

            <div class="separator"></div>
            <div class="flex flex-col">
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-copy-01"></i>
                    <span class="text-sm">COPY LINK</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-folder-download"></i>
                    <span class="text-sm">DOWNLOAD ATTACHMENTS</span>
                </div>
                <div class="item w-70 flex gap-2">
                    <i class="hgi hgi-stroke hgi-printer"></i>
                    <span class="text-sm">PRINT</span>
                </div>
            </div>
            <div class="flex"></div>
        </div>
    </div>
</body>

</html>
